<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بيانات المطعم - لوحة تحكم البطل إكسبريس</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <button class="menu-toggle" id="sidebarToggle">☰</button>
      <h1>بيانات المطعم</h1>
      <div class="topbar-actions">
        <a href="index.html" class="nav-link">الرئيسية</a>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>القائمة</h2>
        <button class="close-sidebar" id="sidebarClose">×</button>
      </div>
      <nav>
        <a href="restaurant.html">بيانات المطعم</a>
        <a href="orders.html">الطلبات اليوم</a>
        <a href="previous-orders.html">الطلبات السابقة</a>
        <a href="captains.html">الكباتن</a>
        <a href="index.html#package-card">الباقة الحالية</a>
        <a href="#" class="logout">تسجيل الخروج</a>
      </nav>
    </aside>

    <main class="content">
      <section class="section-header">
        <h2>معلومات المطعم</h2>
        <p>يمكنك تعديل البيانات وحفظها بسهولة.</p>
      </section>

      <section class="restaurant-card">
        <img src="https://images.unsplash.com/photo-1498654896293-37aacf113fd9?auto=format&fit=crop&w=600&q=80" alt="صورة المطعم" />
        <div class="restaurant-details">
          <div class="field-group">
            <label for="restaurantName">اسم المطعم</label>
            <input id="restaurantName" type="text" value="مطعم البطل" readonly />
          </div>
          <div class="field-group">
            <label for="restaurantPhone">رقم الهاتف</label>
            <input id="restaurantPhone" type="tel" value="01234567890" readonly />
          </div>
          <div class="field-group">
            <label for="restaurantAddress">العنوان</label>
            <textarea id="restaurantAddress" rows="3" readonly>شارع الثورة، مدينة نصر، القاهرة</textarea>
          </div>
          <div class="form-actions">
            <button class="button" id="editRestaurant">تعديل</button>
            <button class="button button-outline" id="saveRestaurant" disabled>حفظ</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
